<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0c0d0a; font-family: 'Inter', system-ui, sans-serif; color: #fff; overflow: hidden; }
  #root { height: 100%; }
  button { font-family: inherit; }
</style>

<body>

<div id="root"></div>

<script src="react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="babel.standalone.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="mock-data.js"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="design-console.js"></script>

<script type="text/babel">
  const { useState, useEffect } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "palette": "paper",
    "accent": "#7cb0ff",
    "displayFont": "inter",
    "monoFont": "inter",
    "density": "comfy",
    "gridBackdrop": 0.1,
    "statusPulse": true,
    "activeRun": "obsidian",
    "productName": "aether",
    "productVersion": "v7.2",
    "userInitials": "VC"
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
    // Force re-render when tweaks change so token mutations apply
    return (
      <>
        <div data-screen-label="04 Console" style={{ position: 'absolute', inset: 0 }}>
          <window.ConsoleDesign tweaks={t} onTweak={setTweak} key={t.palette + t.accent + t.displayFont + t.monoFont + t.density} />
        </div>

        <window.TweaksPanel title="Tweaks">
          <window.TweakSection label="Palette" />
          <window.TweakSelect
            label="Theme"
            value={t.palette}
            options={Object.entries(window.CONSOLE_PALETTES).map(([v, p]) => ({ value: v, label: p.label }))}
            onChange={(v) => setTweak('palette', v)}
          />
          <window.TweakColor
            label="Accent override"
            value={t.accent || window.CONSOLE_PALETTES[t.palette].lime}
            onChange={(v) => setTweak('accent', v)}
          />
          {t.accent && (
            <window.TweakButton label="Reset accent" secondary onClick={() => setTweak('accent', '')} />
          )}

          <window.TweakSection label="Layout" />
          <window.TweakRadio
            label="Density"
            value={t.density}
            options={['compact', 'regular', 'comfy']}
            onChange={(v) => setTweak('density', v)}
          />
          <window.TweakSlider
            label="Grid backdrop"
            value={Math.round(t.gridBackdrop * 100)}
            min={0} max={60} unit="%"
            onChange={(v) => setTweak('gridBackdrop', v / 100)}
          />
          <window.TweakToggle
            label="Status pulse glow"
            value={t.statusPulse}
            onChange={(v) => setTweak('statusPulse', v)}
          />

          <window.TweakSection label="Type" />
          <window.TweakRadio
            label="Display font"
            value={t.displayFont}
            options={[
              { value: 'grotesk', label: 'Grotesk' },
              { value: 'inter', label: 'Inter' },
              { value: 'fraunces', label: 'Serif' },
              { value: 'mono', label: 'Mono' },
            ]}
            onChange={(v) => setTweak('displayFont', v)}
          />
          <window.TweakRadio
            label="Mono font"
            value={t.monoFont}
            options={[
              { value: 'jetbrains', label: 'JetBrains' },
              { value: 'inter', label: 'Inter' },
            ]}
            onChange={(v) => setTweak('monoFont', v)}
          />

          <window.TweakSection label="Active run" />
          <window.TweakRadio
            label="Show"
            value={t.activeRun}
            options={[
              { value: 'obsidian', label: 'Obsidian' },
              { value: 'radarr',   label: 'Radarr' },
            ]}
            onChange={(v) => setTweak('activeRun', v)}
          />

          <window.TweakSection label="Branding" />
          <window.TweakText
            label="Product name"
            value={t.productName}
            onChange={(v) => setTweak('productName', v)}
          />
          <window.TweakText
            label="Version tag"
            value={t.productVersion}
            onChange={(v) => setTweak('productVersion', v)}
          />
          <window.TweakText
            label="User initials"
            value={t.userInitials}
            onChange={(v) => setTweak('userInitials', v)}
          />
        </window.TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>


</body></html>
